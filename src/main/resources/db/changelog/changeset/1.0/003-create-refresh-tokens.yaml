databaseChangeLog:
  - changeSet:
      id: 003-create-refresh-tokens
      author: artsobol

      changes:
        - createSequence:
            sequenceName: refresh_tokens_seq

        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_refresh_tokens
              - column:
                  name: token_hash
                  type: varchar(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: expires_at
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: revoked_at
                  type: timestamptz

              - column:
                  name: revoked
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseColumnNames: user_id
            baseTableName: refresh_tokens
            constraintName: fk_refresh_tokens_user_id
            referencedColumnNames: id
            referencedTableName: users

        - createIndex:
            indexName: idx_refresh_tokens_user_id
            tableName: refresh_tokens
            columns:
              - column:
                  name: user_id

        - createIndex:
            indexName: idx_refresh_tokens_user_id_revoked
            tableName: refresh_tokens
            columns:
              - column:
                  name: user_id
              - column:
                  name: revoked

        - addDefaultValue:
            tableName: refresh_tokens
            columnName: id
            defaultValueSequenceNext: refresh_tokens_seq

      rollback:
        - dropSequence:
            sequenceName: refresh_tokens_seq
        - dropIndex:
            indexName: idx_refresh_tokens_user_id_revoked
            tableName: refresh_tokens
        - dropIndex:
            indexName: idx_refresh_tokens_user_id
            tableName: refresh_tokens
        - dropForeignKeyConstraint:
            baseTableName: refresh_tokens
            constraintName: fk_refresh_tokens_user_id
        - dropTable:
            tableName: refresh_tokens