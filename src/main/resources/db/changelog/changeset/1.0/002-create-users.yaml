databaseChangeLog:
  - changeSet:
      id: 002-create-users
      author: artsobol

      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: users_pk

              - column:
                  name: username
                  type: varchar(32)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_users_username

              - column:
                  name: email
                  type: varchar(128)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_users_email

              - column:
                  name: password
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: is_active
                  type: boolean
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false

              - column:
                  name: created_by
                  type: uuid

              - column:
                  name: updated_by
                  type: uuid

              - column:
                  name: version
                  type: bigint
                  defaultValueNumeric: "0"
                  constraints:
                    nullable: false

        - createTable:
            tableName: user_roles
            columns:
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: roles
                  type: varchar(32)
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: user_roles
            columnNames: user_id, roles
            constraintName: pk_user_roles

        - addForeignKeyConstraint:
            baseTableName: user_roles
            baseColumnNames: user_id
            constraintName: fk_user_roles_user_id
            referencedTableName: users
            referencedColumnNames: id

        - addForeignKeyConstraint:
            baseTableName: users
            baseColumnNames: created_by
            constraintName: fk_users_created_by
            referencedTableName: users
            referencedColumnNames: id
            onDelete: SET NULL

        - addForeignKeyConstraint:
            baseTableName: users
            baseColumnNames: updated_by
            constraintName: fk_users_updated_by
            referencedTableName: users
            referencedColumnNames: id
            onDelete: SET NULL
