spring:
  application:
    name: ShortLink

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  jpa:
    hibernate:
      ddl-auto: validate

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 10s
      client-name: shortlink-redis
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1

management:
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  api-docs:
    enabled: true

  swagger-ui:
    enabled: true

app:
  i18n:
    basename: classpath:i18n/messages/messages,classpath:i18n/errors/errors,classpath:i18n/validations/validations
    encoding: UTF-8
    fallback-to-system-locale: false
  jwt:
    secret: ${JWT_SECRET}
  security:
    password-encoder: argon2
    refresh:
      ttl: ${REFRESH_TTL}
      pepper: ${REFRESH_PEPPER}
  management:
    auth:
      user: ${MANAGEMENT_USER}
      password: ${MANAGEMENT_PASSWORD}
